<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Réinitialiser le mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0D1B3E, #1A56E8); min-height: 100vh; display: flex; align-items: center; }
        .box { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 400px; width: 100%; margin: 0 auto; }
        .box h1 { color: #0D1B3E; font-weight: 700; margin-bottom: 10px; text-align: center; font-size: 24px; }
        .box p { color: #64748B; text-align: center; margin-bottom: 25px; font-size: 14px; }
        .form-control { border-radius: 8px; border: 1.5px solid #E2E8F0; padding: 10px 15px; }
        .btn-submit { background: #1A56E8; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; width: 100%; }
        .btn-submit:hover { background: #1447CC; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Nouveau mot de passe</h1>
            <p>Choisissez un mot de passe sécurisé</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Nouveau mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="Min. 8 caractères, 1 majuscule, 1 chiffre" required>
                </div>
                <button type="submit" class="btn-submit">Réinitialiser</button>
            </form>
        </div>
    </div>
</body>
</html>
