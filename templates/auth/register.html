<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0D1B3E, #1A56E8); min-height: 100vh; display: flex; align-items: center; }
        .register-box { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 400px; width: 100%; }
        .register-box h1 { color: #0D1B3E; font-weight: 700; margin-bottom: 30px; text-align: center; }
        .form-control { border-radius: 8px; border: 1.5px solid #E2E8F0; padding: 10px 15px; }
        .form-control:focus { border-color: #1A56E8; box-shadow: 0 0 0 3px rgba(26,86,232,0.1); }
        .btn-register { background: linear-gradient(135deg, #1A56E8, #2563EB); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; width: 100%; }
        .btn-register:hover { background: linear-gradient(135deg, #1447CC, #2153DB); }
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: #1A56E8; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>Créer un compte</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Prénom</label>
                <input type="text" name="first_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" name="last_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-register">S'inscrire</button>
        </form>
        
        <div class="login-link">
            Déjà un compte ? <a href="{{ url_for('auth.login') }}">Se connecter</a>
        </div>
    </div>
</body>
</html>
